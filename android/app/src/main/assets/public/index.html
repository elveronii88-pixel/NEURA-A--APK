<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuraAI | Lumina OS v2.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e7eb; height: 100dvh; width: 100vw; overflow: hidden; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.08); }
        
        /* Layout Yapısı */
        #main-app { display: none; width: 100%; height: 100%; grid-template-columns: 300px 1fr; }
        
        @media (max-width: 768px) {
            #main-app { grid-template-columns: 1fr; }
            aside { 
                position: fixed; left: -100%; top: 0; bottom: 0; width: 280px; z-index: 50; 
                transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); background: #0a0a0a;
            }
            aside.active { left: 0; box-shadow: 20px 0 50px rgba(0,0,0,0.8); }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; backdrop-filter: blur(4px); }
            .overlay.active { display: block; }
        }

        /* Mesaj Balonları */
        .bubble { max-width: 85%; padding: 1rem 1.25rem; border-radius: 1.2rem; font-size: 14px; line-height: 1.6; word-wrap: break-word; }
        .chat-item-active { background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.2); color: white !important; }

        /* Giriş Paneli */
        #auth-panel { position: absolute; z-index: 100; width: 90%; max-width: 400px; }
        .input-code { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 15px; padding: 15px; width: 100%; text-align: center; font-size: 2rem; letter-spacing: 0.3em; outline: none; color: white; }
        
        .fade-out { opacity: 0; transform: scale(0.9); transition: 0.5s; pointer-events: none; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center">

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="auth-panel" class="fade-in">
        <div class="glass p-8 sm:p-12 rounded-[2.5rem] shadow-2xl text-center border-white/10">
            <h1 class="text-4xl font-thin tracking-[0.4em] mb-4 italic text-white">NEURA</h1>
            <p id="step-title" class="text-gray-600 text-[9px] uppercase tracking-[0.3em] mb-10 font-black">Lumina Secure</p>
            <div id="auth-content" class="space-y-4">
                <button onclick="signInWithGoogle()" class="w-full bg-white text-black font-bold rounded-xl p-4 flex items-center justify-center gap-2 hover:bg-gray-100 transition active:scale-95">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/firebase_ui/host.png" class="w-5 h-5">
                    GOOGLE GİRİŞİ
                </button>
            </div>
        </div>
    </div>

    <div id="main-app">
        <aside id="sidebar" class="glass h-full flex flex-col p-6 border-r border-white/5 overflow-hidden">
            <button onclick="createNewChat(); toggleSidebar();" class="w-full bg-white text-black rounded-xl p-3.5 flex items-center justify-center gap-2 font-bold mb-8 hover:bg-blue-600 hover:text-white transition shadow-lg active:scale-95">
                <i data-lucide="plus" class="w-4 h-4"></i> YENİ SOHBET
            </button>
            <div id="history-container" class="flex-1 overflow-y-auto space-y-2 pr-1"></div>
            <div class="mt-auto pt-4 border-t border-white/5">
                <div class="flex items-center justify-between bg-white/5 p-3 rounded-2xl border border-white/5">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <img id="u-photo" src="" class="w-8 h-8 rounded-full border border-white/10">
                        <span id="u-name" class="text-[11px] font-bold text-white truncate w-20">..</span>
                    </div>
                    <button onclick="logout()" class="text-gray-500 hover:text-red-500"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </aside>

        <main id="chat-bg" class="flex flex-col relative bg-[#040404] overflow-hidden">
            <header class="h-16 border-b border-white/5 flex items-center justify-between px-6 sm:px-10 bg-black/40 backdrop-blur-3xl z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white mr-2">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                    <span class="text-[9px] font-black text-gray-500 tracking-[0.3em] uppercase">NEURA v2.4</span>
                </div>
            </header>

            <div id="chat-flow" class="flex-1 overflow-y-auto p-6 sm:p-10 space-y-8 pb-32"></div>

            <div class="absolute bottom-0 left-0 right-0 p-4 sm:p-8 bg-gradient-to-t from-black via-black/95 to-transparent z-10">
                <div class="max-w-4xl mx-auto flex items-end gap-2 glass p-2 rounded-2xl sm:rounded-[2rem] border-white/10 shadow-2xl">
                    <textarea id="chat-input" rows="1" placeholder="Bir şeyler yaz..." class="flex-1 bg-transparent py-3 px-4 outline-none text-sm text-white resize-none max-h-32"></textarea>
                    <button onclick="handleSend()" class="p-4 bg-white text-black rounded-xl sm:rounded-2xl hover:bg-blue-600 hover:text-white transition active:scale-90 shadow-xl">
                        <i data-lucide="send-horizontal" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBOtvm4R03jJgt4OsEJ5Gp35_5MmLb3M8A",
            authDomain: "neuraai-77ca8.firebaseapp.com",
            projectId: "neuraai-77ca8",
            storageBucket: "neuraai-77ca8.firebasestorage.app",
            messagingSenderId: "209703034323",
            appId: "1:209703034323:web:ef098c0d5752f81c17e326",
            measurementId: "G-DRP5RPLNV3"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();
        const GROQ_KEY = "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";

        let currentUser = null, currentMessages = [], currentId = null;

        function toggleSidebar() {
            if(window.innerWidth > 768) return;
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        async function signInWithGoogle() {
            try {
                const result = await auth.signInWithPopup(provider);
                const code = Math.floor(100000 + Math.random() * 900000);
                document.getElementById('auth-content').innerHTML = `
                    <div class="fade-in space-y-4">
                        <input type="text" id="v-code" maxlength="6" class="input-code" placeholder="000000">
                        <button onclick="verifyCode(${code})" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl shadow-lg">DOĞRULA</button>
                    </div>
                `;
                console.log("CODE:", code);
                alert("Kod: " + code);
            } catch (e) { alert("Hata!"); }
        }

        function verifyCode(t) {
            if(document.getElementById('v-code').value == t) {
                currentUser = auth.currentUser;
                document.getElementById('auth-panel').classList.add('fade-out');
                setTimeout(() => {
                    document.getElementById('auth-panel').style.display = 'none';
                    document.getElementById('main-app').style.display = 'grid';
                    initApp();
                }, 500);
            } else alert("Kod yanlış!");
        }

        function initApp() {
            document.getElementById('u-name').innerText = currentUser.displayName;
            document.getElementById('u-photo').src = currentUser.photoURL;
            loadHistory();
            createNewChat();
            lucide.createIcons();
        }

        function createNewChat() {
            currentId = Date.now();
            currentMessages = [{ role: "system", content: "Sen NeuraAI'sın." }];
            document.getElementById('chat-flow').innerHTML = '';
            renderHistoryUI();
            appendBubble('ai', `Hoş geldin **${currentUser.displayName.split(' ')[0]}**. Sistem hazır.`);
        }

        async function handleSend() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            appendBubble('user', text);
            currentMessages.push({ role: "user", content: text });
            input.value = '';

            const bid = 'b' + Date.now();
            appendBubble('ai', '...', bid);

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: currentMessages })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                currentMessages.push({ role: "assistant", content: reply });
                document.getElementById(bid).innerHTML = reply.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                saveToLocal();
            } catch (e) { document.getElementById(bid).innerText = "Hata oluştu!"; }
        }

        function saveToLocal() {
            let history = JSON.parse(localStorage.getItem(`neura_${currentUser.uid}`)) || [];
            const title = currentMessages.find(m => m.role === 'user')?.content.substring(0, 20) + "..";
            const idx = history.findIndex(c => c.id === currentId);
            if(idx > -1) history[idx].messages = [...currentMessages];
            else history.unshift({ id: currentId, title, messages: [...currentMessages] });
            localStorage.setItem(`neura_${currentUser.uid}`, JSON.stringify(history.slice(0, 30)));
            renderHistoryUI();
        }

        function renderHistoryUI() {
            const history = JSON.parse(localStorage.getItem(`neura_${currentUser.uid}`)) || [];
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            history.forEach(chat => {
                const active = chat.id === currentId;
                const div = document.createElement('div');
                div.className = `p-3.5 rounded-xl text-[11px] transition-all cursor-pointer flex justify-between items-center ${active ? 'chat-item-active' : 'text-gray-500 hover:bg-white/5'}`;
                div.innerHTML = `<span onclick="loadChat(${chat.id}); toggleSidebar();" class="truncate flex-1 italic font-medium">${chat.title}</span><button onclick="deleteChat(${chat.id})" class="ml-2 hover:text-red-500"><i data-lucide="x" class="w-3 h-3"></i></button>`;
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function loadChat(id) {
            const history = JSON.parse(localStorage.getItem(`neura_${currentUser.uid}`)) || [];
            const chat = history.find(c => c.id === id);
            if(!chat) return;
            currentId = id; currentMessages = [...chat.messages];
            document.getElementById('chat-flow').innerHTML = '';
            currentMessages.forEach(m => { if(m.role !== 'system') appendBubble(m.role === 'assistant' ? 'ai' : 'user', m.content.replace(/\n/g, '<br>')); });
            renderHistoryUI();
        }

        function deleteChat(id) {
            let history = JSON.parse(localStorage.getItem(`neura_${currentUser.uid}`)) || [];
            history = history.filter(c => c.id !== id);
            localStorage.setItem(`neura_${currentUser.uid}`, JSON.stringify(history));
            if(currentId === id) createNewChat(); else renderHistoryUI();
        }

        function appendBubble(role, content, id = null) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            div.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
            div.innerHTML = `<div id="${id}" class="bubble shadow-xl ${role === 'user' ? 'bg-white text-black font-semibold' : 'glass text-gray-200'}">${content}</div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function loadHistory() { renderHistoryUI(); }
        function logout() { auth.signOut(); location.reload(); }
        
        document.getElementById('chat-input')?.addEventListener('keydown', (e) => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
        });
        lucide.createIcons();
    </script>
</body>
</html>
